<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ELMI – Errori</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Libreria XLSX corretta -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    background-image: url('sfondo-elmi-verticale.jpg');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
  }

  .home-button {
    position: fixed;
    font-size: 30px;
    top: 5px;
    right: 5px;
    background-color: #d9534f;
    color: white;
    padding: 6px 18px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    transition: background-color 0.2s ease;
    z-index: 999;
  }

  .home-button:hover {
    background-color: #c9302c;
  }

  header {
    background: #b91c1c;
    color: white;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
  }

  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    
    padding: 15px;
    margin-top: 70px; /* 🔥 Aggiunto per abbassare X Y Z */
}
  .tab-button {
    background: #1e40af;
    color: white;
    padding: 12px 26px;
    font-size: 20px;
    border: none;
    font-size: 8px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }

  .tab-button:hover {
    background: #1e3a8a;
    font-size: 8px;
  }

  .tab-button.active {
    background: #0d9488;
  }

  .container {
    max-width: 600px;
    margin: 40px auto;
    background-color: transparent !important;
    padding: 30px;
    border-radius: 12px;
    border: 2px solid rgba(255, 255, 255, 0.6);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 20px;
    font-size: 26px;
    color: red;
  }

  select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #9ca3af;
    font-size: 16px;
  }
.tab-title {
    text-align: center;
    color: red;
    font-size: 20px;
    font-weight: bold;
    margin: 10px 0 5px 0; /* molto compatto */
}
  textarea {
    resize: vertical;
    min-height: 90px;
  }

  .pdf-container {
    max-width: 900px;
    margin: 40px auto;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    text-align: center;
  }

  .pdf-image {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 20px;
  }
</style>
</head>

<body>

<a class="home-button" href="https://balza1979.github.io/Elmi-Documenti/">Home</a>
<h3 class="tab-title">SCHEDE ELMI</h3>
<div class="tab-bar">
  <button class="tab-button active" onclick="selezionaFoglio('errori', this)">ERRORI BETA-K</button>
  <button class="tab-button" onclick="selezionaFoglio('stato', this)">STATI BETA-K</button>
</div>

<h3 class="tab-title">ALTRI DISPOSITIVI</h3>
<div class="tab-bar">
  <button class="tab-button" onclick="selezionaFoglio('situazione', this)">SITUAZIONE IMPIANTO</button>
  <button class="tab-button" onclick="selezionaFoglio('lm2a_errori', this)">FUJI_LM2A</button>
  <button class="tab-button" onclick="selezionaFoglio('Nxp_errori', this)">VACON_NXP</button>
</div>
<div class="container">
<label id="labelA">Caricamento...</label>
  <select id="menu"></select>

  <label id="labelB"></label>
  <textarea id="campoB" readonly></textarea>

  <label id="labelC"></label>
  <textarea id="campoC" readonly></textarea>

  <label id="labelD"></label>
  <textarea id="campoD" readonly></textarea>
</div>

<div class="pdf-container">
  <img src="da.png" class="pdf-image">
  <img src="led_gialli.png" class="pdf-image">
  <img src="Info_aggiuntive_errori v1.png" class="pdf-image">
</div>

<script>
let workbookCache = null;

async function loadWorkbook() {
  if (workbookCache) return workbookCache;
  const file = await fetch("errori.xlsx");
  const arrayBuffer = await file.arrayBuffer();
  workbookCache = XLSX.read(arrayBuffer, { type: "array" });
  return workbookCache;
}

async function caricaExcel(nomeFoglio) {
  const workbook = await loadWorkbook();
  const sheet = workbook.Sheets[nomeFoglio];

  if (!sheet) {
    alert("❌ Foglio '" + nomeFoglio + "' non trovato!");
    return;
  }

  const dati = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const intestazioni = dati[0];
  const righe = dati.slice(1);

  document.getElementById("labelA").textContent = intestazioni[0] || "";
  document.getElementById("labelB").textContent = intestazioni[1] || "";
  document.getElementById("labelC").textContent = intestazioni[2] || "";
  document.getElementById("labelD").textContent = intestazioni[3] || "";

  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  righe.forEach((riga, index) => {
    const opt = document.createElement("option");
    opt.value = index;
    opt.textContent = riga[0];
    menu.appendChild(opt);
  });

  menu.onchange = () => {
    const r = righe[menu.value];
    document.getElementById("campoB").value = r[1] || "";
    document.getElementById("campoC").value = r[2] || "";
    document.getElementById("campoD").value = r[3] || "";
  };

  menu.dispatchEvent(new Event("change"));
}

function selezionaFoglio(nomeFoglio, bottone) {
  document.querySelectorAll(".tab-button").forEach(btn => btn.classList.remove("active"));
  bottone.classList.add("active");
  caricaExcel(nomeFoglio);
}

caricaExcel("errori");
</script>

</body>
</html>
